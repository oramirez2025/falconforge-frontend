# .github/workflows/build-and-push-frontend.yml
name: Build and Push Frontend to ECR

on:
  push:
    branches:
      - main

env:
  ECR_REPOSITORY: falconforge-frontend # ECR repo name

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: falconforge-frontend
          IMAGE_TAG: latest
          REACT_APP_BACKEND_URL: https://theproductpeek.shop/api/
        run: |
          docker buildx build --platform linux/amd64 \
            --build-arg REACT_APP_BACKEND_URL="${REACT_APP_BACKEND_URL}" \
            -t "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" \
            --push .

          echo "Frontend image pushed to ECR: $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
